name: Refresh Reading List Images

# Disabled - reading images are now cached locally using headless Chrome
# (required for Medium/Cloudflare-protected sites) and committed to the repo.
# Run `node scripts/cache-reading-images.js --force` locally instead.
on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force refresh all images'
        required: false
        default: 'false'
        type: boolean

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch latest reading list
        run: node scripts/fetch-reading-list.js
        env:
          INSTAPAPER_CONSUMER_KEY: ${{ secrets.INSTAPAPER_CONSUMER_KEY }}
          INSTAPAPER_CONSUMER_SECRET: ${{ secrets.INSTAPAPER_CONSUMER_SECRET }}
          INSTAPAPER_USERNAME: ${{ secrets.INSTAPAPER_USERNAME }}
          INSTAPAPER_PASSWORD: ${{ secrets.INSTAPAPER_PASSWORD }}

      - name: Refresh stale reading list images
        if: ${{ github.event.inputs.force != 'true' }}
        run: node scripts/cache-reading-images.js --refresh-stale

      - name: Force refresh all reading list images
        if: ${{ github.event.inputs.force == 'true' }}
        run: node scripts/cache-reading-images.js --force

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/assets/reading-previews src/data/reading-image-cache.json 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/assets/reading-previews src/data/reading-image-cache.json
          git commit -m "chore: refresh reading list images

          Updated by scheduled workflow.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push

      - name: Summary
        run: |
          echo "### Reading List Image Refresh Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "Changes were committed and pushed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Updated files:**" >> $GITHUB_STEP_SUMMARY
            git diff --name-only HEAD~1 | head -20 >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes detected - all images are up to date." >> $GITHUB_STEP_SUMMARY
          fi
