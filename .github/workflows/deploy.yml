name: Build and Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - 'scripts/**'
  pull_request:
    paths-ignore:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - 'scripts/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: 👨‍💻 Checkout code
        uses: actions/checkout@v4

      - name: 🌸 Setup PNPM
        uses: pnpm/action-setup@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔒 Security audit
        run: pnpm audit

      - name: 💾 Build Cache
        uses: actions/cache@v4
        with:
          path: node_modules/.cache
          key: build-cache-${{ runner.os }}-${{ hashFiles('src/assets/**/*', 'src/content/**/*') }}
          restore-keys: |
            build-cache-${{ runner.os }}-


      # Note: Main Astro image processing cache removed - no longer needed!
      # Blog post images now use Cloudflare Image Transformations (on-demand CDN processing).
      # We only cache OpenGraph image generation (astro-og-canvas) which still uses Sharp.

      - name: 🏗️ Build site
        run: |
          mkdir -p node_modules/.astro-og-canvas
          pnpm run build
        env:
          NODE_ENV: production

      - name: 📊 Build summary
        run: |
          echo "### Build Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Directory Size:**" >> $GITHUB_STEP_SUMMARY
          du -sh dist >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files Generated:**" >> $GITHUB_STEP_SUMMARY
          find dist -type f | wc -l >> $GITHUB_STEP_SUMMARY

      - name: 🚀 Deploy to Cloudflare Workers (Static Assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: 📝 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build successful! Site deployed to Cloudflare Workers.'
            })
