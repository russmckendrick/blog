{{ if .IsNamedParams }}

{{else}}
<p><img src="{{.Get "src" }}" alt="{{.Get "alt" }}"></p>

{{ else }}

{{ if eq (getenv "HUGO_ENV") "production" }}
<p><img src="https://andbjhorgm.cloudimg.io/cdno/n/webp-lossy-21.png-lossy-30/{{.Get 0 | absURL }}" alt=""></p>
{{else}}
<p><img src="{{.Get 0}}" alt=""></p>
{{end}}

{{ end }}
