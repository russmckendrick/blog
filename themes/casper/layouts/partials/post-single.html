<article class="post-card post"> 
    {{ if eq (getenv "HUGO_ENV") "production" }}
    <a class="post-card-image-link" href="{{ .Permalink }}">
      <div class="post-card-image lazy" data-bg="(https://andbjhorgm.cloudimg.io/width/600/webp-lossy-21.png-lossy-30/{{.Params.image | absURL}})"></div>
    </a>
    {{else}}
    <a class="post-card-image-link" href="{{ .Permalink }}">
      <div class="post-card-image lazy" data-bg="url({{.Params.image | absURL}})"></div>
    </a> 
    {{end}}
    <div class="post-card-content">
      <a class="post-card-content-link" href="{{ .Permalink }}">
          <header class="post-card-header">
              {{if .Params.tags }}<span class="post-card-tags">{{ range $index, $tag := .Params.tags }}
              #{{$tag}} {{end}} </span>
              {{ end }}
              <h2 class="post-card-title">{{.Title}}</h2>
          </header>
      </a>
      <section class="post-card-excerpt" style="padding: 0 25px;">
          {{ .Content }}
      </section>

      <footer class="post-card-meta">
          {{ if eq (getenv "HUGO_ENV") "production" }}
          <img class="author-profile-image lazy" data-src="https://andbjhorgm.cloudimg.io/width/50/webp-lossy-21.png-lossy-30/{{ (.Params.authorAvatar | default .Site.Params.authorAvatar) | absURL}}" alt="Author" />
          {{else}}
          <img class="author-profile-image lazy" data-src="{{ (.Params.authorAvatar | default .Site.Params.authorAvatar) | absURL}}" alt="Author" />
          {{end}}
          <span class="post-card-author"><a href="/">{{.Params.author | default .Site.Params.author}}</a></span>
      </footer>
    </div>
</article>
